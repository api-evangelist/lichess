              type: array
              items:
                type: string
              minItems: 2
              maxItems: 2
      required:
      - id
      - url
      - status
      - challenger
      - destUser
      - variant
      - rated
      - speed
      - timeControl
      - color
      - perf
      - urlWhite
      - urlBlack
      - open
    Ok:
      properties:
        ok:
          type: boolean
      required:
      - ok
    PerfType:
      type: string
      enum:
