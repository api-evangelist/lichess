      description: 'Use patronColor value instead to determine if player is a patron.

        '
    GameStream:
      type: array
      items:
        $ref: '#/components/schemas/GameStreamGame'
      example:
      - id: A5fcMO3k
        rated: true
        variant: standard
        speed: bullet
        perf: bullet
        createdAt: 1525789431889
        status: 20
        statusName: started
        clock:
          initial: 60
          increment: 0
