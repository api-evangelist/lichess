            $ref: '#/components/schemas/Speed'
          perf:
            $ref: '#/components/schemas/PerfType'
          rated:
            type: boolean
          initialFen:
            type: string
          fen:
            type: string
          player:
            $ref: '#/components/schemas/GameColor'
          turns:
            type: integer
          startedAtTurn:
            type: integer
          source:
            $ref: '#/components/schemas/GameSource'
          status:
            $ref: '#/components/schemas/GameStatus'
