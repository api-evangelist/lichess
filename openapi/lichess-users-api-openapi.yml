          headline: Watch and learn chess from an International Master! :)
          description: 'Thank you so much for checking my stream out! It will be a great mix of entertaining play, teaching moments, and all other things great with chess! The more you engage, the better! I will play whatever openings you recommend, or even specific ideas you would like to see! '
          twitch: https://www.twitch.tv/jludwig
