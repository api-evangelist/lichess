            description: Whether the round is used when calculating players' rating changes.
          customScoring.white.win:
            $ref: '#/components/schemas/BroadcastCustomPoints'
          customScoring.white.draw:
            $ref: '#/components/schemas/BroadcastCustomPoints'
          customScoring.black.win:
