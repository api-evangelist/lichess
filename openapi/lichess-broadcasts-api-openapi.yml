        fideId:
          type: integer
          example: 3408230
        team:
          type: string
        fed:
          type: string
          example: CHI
      required:
      - name
    BroadcastGroup:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        tours:
          type: array
          items:
            $ref: '#/components/schemas/BroadcastGroupTour'
      required:
      - id
      - slug
      - name
      - tours
    BroadcastRoundGame:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        fen:
          type: string
        players:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              title:
                $ref: '#/components/schemas/Title'
              rating:
                type: integer
              fideId:
                type: integer
              fed:
                type: string
              clock:
                type: integer
        lastMove:
          type: string
        check:
          type: string
          enum:
          - +
          - '#'
        thinkTime:
          type: integer
        status:
          description: The result of the game
          type: string
          enum:
          - '*'
          - 1-0
          - 0-1
          - ½-½
      required:
      - id
      - name
    BroadcastForm:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
          minLength: 3
          description: 'Name of the broadcast tournament.


            Example: `Sinquefield Cup`

            '
        info.format:
          type: string
          maxLength: 80
          description: 'Tournament format.

            Example: `"8-player round-robin" or "5-round Swiss"`

            '
        info.location:
          type: string
          maxLength: 80
          description: 'Tournament Location

            '
        info.tc:
          type: string
          maxLength: 80
          description: 'Time control.

            Example: `"Classical" or "Rapid" or "Rapid & Blitz"`

            '
        info.fideTC:
          $ref: '#/components/schemas/FideTimeControl'
        info.timeZone:
          type: string
          description: 'Timezone of the tournament. Example: `America/New_York`.

            See [list of possible timezone identifiers](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones) for more.

            '
        info.players:
          type: string
          maxLength: 120
          description: 'Mention up to 4 of the best players participating.

            '
        info.website:
          type: string
          format: uri
          description: 'Official website. External website URL

            '
        info.standings:
          type: string
          format: uri
          description: 'Official Standings. External website URL, e.g. chess-results.com, info64.org

            '
        markdown:
          type: string
          maxLength: 20000
          description: 'Optional long description of the broadcast. Markdown is supported.

            '
        showScores:
          type: boolean
          default: false
          description: 'Show players scores based on game results

            '
        showRatingDiffs:
          type: boolean
          default: false
          description: 'Show player''s rating diffs

            '
        teamTable:
          type: boolean
          default: false
          description: 'Show a team leaderboard. Requires WhiteTeam and BlackTeam PGN tags.

            '
        visibility:
          type: string
          enum:
          - public
          - unlisted
          - private
          default: public
          description: 'Who can view the broadcast.

            * `public`: Default. Anyone can view the broadcast

            * `unlisted`: Only people with the link can view the broadcast

            * `private`: Only the broadcast owner(s) can view the broadcast

            '
        players:
          type: string
          description: 'Optional replace player names, ratings and titles.


            One line per player, formatted as such:


            ```txt

            player name / FIDE ID

            ```


            Example:


            ```txt

            Magnus Carlsen / 1503014

            ```


            Player names ignore case and punctuation, and match all possible combinations of 2 words: "Jorge Rick Vito" will match "Jorge Rick", "jorge vito", "Rick, Vito", etc.


            If the player is NM or WNM, you can:


            ```txt

            player name / FIDE ID / title

            ```


            Alternatively, you may set tags manually, like so:


            ```txt

            player name / rating / title / new name

            ```


            All values are optional. Example:

            ```txt

            Magnus Carlsen / 2863 / GM

            YouGotLittUp / 1890 / / Louis Litt

            ```

            '
        teams:
          type: string
          description: 'Optional: assign players to teams


            One line per player, formatted as such:

            ```txt

            Team name; Fide Id or Player name

            ```


            Example:

            ```txt

            Team Cats ; 3408230

            Team Dogs ; Scooby Doo

            ```


            By default the PGN tags WhiteTeam and BlackTeam are used.

            '
        tier:
          type: integer
          enum:
          - 3
          - 4
          - 5
          description: 'Optional, for Lichess admins only, used to feature on /broadcast.


            * `3` for Official: normal tier

            * `4` for Official: high tier

            * `5` for Official: best tier

            '
        tiebreaks[]:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/BroadcastTiebreakExtendedCode'
      required:
      - name
    BroadcastGameEntry:
      type: object
      properties:
        round:
          type: string
          description: ID of the round
        id:
          type: string
          description: The game ID. Analogous to chapterId.
        opponent:
          $ref: '#/components/schemas/BroadcastPlayerWithFed'
        color:
          $ref: '#/components/schemas/GameColor'
        points:
          $ref: '#/components/schemas/BroadcastPointStr'
        customPoints:
          $ref: '#/components/schemas/BroadcastCustomPoints'
        ratingDiff:
          type: integer
          description: The change in rating for the player as a result of this game
        fideTC:
          $ref: '#/components/schemas/FideTimeControl'
        ongoing:
          type: boolean
      required:
      - round
      - id
      - opponent
      - color
      - fideTC
    BroadcastGroupTour:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        active:
          type: boolean
        live:
          type: boolean
      required:
      - id
      - name
      - active
      - live
    BroadcastPlayerTiebreak:
      type: object
      properties:
        extendedCode:
          $ref: '#/components/schemas/BroadcastTiebreakExtendedCode'
        description:
          type: string
          example: Buchholz Cut 1
        points:
          type: number
          example: 45.5
      required:
      - extendedCode
      - description
      - points
    LightUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        flair:
          $ref: '#/components/schemas/Flair'
        title:
          $ref: '#/components/schemas/Title'
        patron:
          $ref: '#/components/schemas/Patron'
        patronColor:
          $ref: '#/components/schemas/PatronColor'
      required:
      - id
      - name
    BroadcastWithRounds:
      type: object
      properties:
        tour:
          $ref: '#/components/schemas/BroadcastTour'
        group:
          type: string
        rounds:
          type: array
          items:
            $ref: '#/components/schemas/BroadcastRoundInfo'
        defaultRoundId:
          type: string
        photos:
          $ref: '#/components/schemas/BroadcastPhotos'
      required:
      - tour
      - rounds
    Title:
      type: string
      enum:
      - GM
      - WGM
      - IM
      - WIM
      - FM
      - WFM
      - NM
      - CM
      - WCM
      - WNM
      - LM
      - BOT
      description: only appears if the user is a titled player or a bot user
    BroadcastTour:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: integer
          example: 1722169800000
        dates:
          type: array
          items:
            type: integer
            format: int64
          description: Start and end dates of the tournament, as Unix timestamps in milliseconds
          minItems: 1
          maxItems: 2
          example:
          - 1722169800000
          - 1722666600000
        info:
          type: object
          description: Additional display information about the tournament
          properties:
            website:
              type: string
              format: uri
              description: Official website. External website URL
            players:
              type: string
              description: Featured players
            location:
              type: string
              description: Tournament location
            tc:
              type: string
              description: Time control
            fideTC:
              description: FIDE rating category
              $ref: '#/components/schemas/FideTimeControl'
            timeZone:
              type: string
              description: 'Timezone of the tournament. Example: `America/New_York`.

                See [list of possible timezone identifiers](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones) for more.

                '
            standings:
              type: string
              format: uri
              description: Official standings website. External website URL
            format:
              type: string
              description: Tournament format
        tier:
          type: integer
          description: Used to designate featured tournaments on Lichess
        image:
          type: string
          format: uri
        description:
          type: string
          description: Full tournament description in markdown format, or in HTML if the html=1 query parameter is set.
        teamTable:
          type: boolean
        showTeamScores:
          type: boolean
        url:
          type: string
          format: uri
        communityOwner:
          $ref: '#/components/schemas/LightUser'
      required:
      - id
      - name
      - slug
      - createdAt
      - url
