          description: "Join the team for regular tournaments and other community-driven events. Everyone is welcome to join!\r\n\r\n## Upcoming events\nDay|Date|Time, [UTC](https://savvytime.com/converter/utc)|Event\n---|---|---|---\nFriday|May 15|19:00|[Weekly Arena](https://lichess.org/tournament/V6u8TCNN)\nSaturday|May 16|16:00|[Team Battle](https://lichess.org/tournament/yQkkr4Xn)\nSunday|May 17|15:00|[Patron wings Arena](https://lichess.org/tournament/2fychJs4)\nSunday|May 17|16:00|[U2000 Arena](https://lichess.org/tournament/Ne8UdI2Z)\nThursday|May 21|16:00|[Shield Arena](https://lichess.org/tournament/j5fF833F)\nFriday|May 29|19:00|[Monthly Arena](https://lichess.org/tournament/21Ihagyj)\nSat+Sun|Jun 6–7||[Amsterdam OTB](https://lichess.org/team/iaf-antichess-world-championship-team)\n\nReigning champs: @Tetiksh1Agrawal (ACWC), @Lmaoooooooooooooooo (Shield), [Antichessmasters](https://lichess.org/team/antichessmasters) (Team Battle), @joshicat (U2000).\n## Learning Material\r\n**Studies**: [Basics](/study/4XBZbCFY) • [Tactics](/study/WLrT4U2E) • [Endgames](/study/VFsD8X5H) • [3v1 Endgames](/study/k5DATDVV) • [Openings](/study/vXxLrBTY)\r\n**Intro videos**: [How to play antichess: Part 1](https://youtu.be/5KLVSxAfQ9M), [Part 2](https://youtu.be/n2Mw6E8WabQ) • [Rules & brief history](https://youtu.be/fm7FLblKFv0)\r\n**Book**: [The Ultimate Guide to Antichess](http://perpetualcheck.com/antichess)\r\n**Puzzles**: [Various](/study/5GrkXfA0) • [Themed](/study/lJfYzKtd) • [Endgame](/study/YuktqKg2) • [Midgame](/study/jKyrZTxS) • [Chess Variants Training](https://chessvariants.training/Puzzle/Antichess)\r\n**Ranked puzzles**: [1](/study/yqP1uKPO) • [2](/study/ZJJrwtTo) • [3](/study/yTnMHbGY) • [4](/study/7LbMHGFk) • [5](/study/BV5fZcXK) • [6](/study/gdiGuDJs)\r\n\r\n---\r\n**Papers** (PDF): [1.e3 wins for White](http://magma.maths.usyd.edu.au/~watkins/LOSING_CHESS/LCsolved.pdf) • [3-man pawnless endings](http://www.jsbeasley.co.uk/vchess/losing3man.pdf) • [Survey: Endgames ](http://www.jsbeasley.co.uk/vchess/losingendlit.pdf)\r\n**Openings theory**: [Proof](https://magma.maths.usyd.edu.au/~watkins/LOSING_CHESS) • [Solutions](https://antichess.onrender.com/) • [Nilatac's opening book](https://catalin.francu.com/nilatac/book.php)\r\n**Video content**: [Firebatprime](https://www.youtube.com/channel/UCVWt6kOPS_HvKkADhYs8L_g) • [YourselfAntichess](https://www.youtube.com/channel/UCIfjM1orOwnkrQoYt1NVSCQ) • [Antichess Lore](https://www.youtube.com/channel/UCwO6d9Rtzt3LweUVhGJHAuw) • [TUGR](https://www.youtube.com/channel/UCdkPoOjHeiHyzX-KXhlZfUA) • [KidCh3ss](https://www.youtube.com/channel/UCeF5D5HDj5bKvfUzGZ1g9Hw)\r\n**Bots**: @anti-bot • @VariantsBot\r\n**Other**: [Guide](/@/firebatprime/blog/-/L7OCljZF) • [ACWC results](http://perpetualcheck.com/antichess/lichess.php) • [ACWC team](/team/antichess-wc) • [Academy](/team/antichess-academy) • [Openings](http://perpetualcheck.com/antichess/openings.php) • [Chess variants](http://www.jsbeasley.co.uk/cvariants.htm)\r\n\r\n## Other Lichess Variant Teams\r\n[Chess960](/team/lichess-chess960) • [King of the Hill](/team/lichess-king-of-the-hill) • [Three-check](/team/lichess-three-check) • [Atomic](/team/lichess-atomic) • [Horde](/team/lichess-horde) • [Racing Kings](/team/lichess-racing-kings) • [Crazyhouse](/team/lichess-crazyhouse)"
