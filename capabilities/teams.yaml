      - name: teamrequestdecline
        method: POST
        description: 'Decline join request'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          required: true
        - name: userId
          in: path
          type: string
          required: true
    - name: team-teamid-kick-userid
      path: /api/team/{teamId}/kick/{userId}
      operations:
      - name: teamidkickuserid
        method: POST
        description: 'Kick a user from your team'
        outputRawFormat: json
        outputParameters:
