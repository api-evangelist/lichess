      path: /team/{teamId}/join
      operations:
      - name: teamidjoin
        method: POST
        description: 'Join a team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: false
    - name: team-teamid-quit
      path: /team/{teamId}/quit
      operations:
      - name: teamidquit
        method: POST
        description: 'Leave a team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          required: true
    - name: team-teamid-requests
      path: /api/team/{teamId}/requests
      operations:
      - name: teamrequests
        method: GET
        description: 'Get join requests'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
