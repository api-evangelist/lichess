naftiko: 1.0.0-alpha2
info:
  label: Lichess API — Teams
  description: 'Lichess API — Teams. 14 operations. Lead operation: Get team swiss tournaments. Self-contained Naftiko capability covering one Lichess business surface.'
  tags:
  - Lichess
  - Teams
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LICHESS_API_TOKEN: LICHESS_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: teams
    baseUri: https://lichess.org
    description: Lichess Teams business capability. Self-contained, no shared references.
    resources:
    - name: team-teamid-swiss
      path: /api/team/{teamId}/swiss
      operations:
      - name: apiteamswiss
        method: GET
        description: 'Get team swiss tournaments'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          required: true
        - name: max
          in: query
          type: string
          required: false
        - name: status
          in: query
          type: string
          required: false
        - name: createdBy
          in: query
          type: string
          required: false
        - name: name
          in: query
          type: string
          required: false
    - name: team-teamid
      path: /api/team/{teamId}
      operations:
      - name: teamshow
        method: GET
        description: 'Get a single team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          required: true
    - name: team-all
      path: /api/team/all
      operations:
      - name: teamall
        method: GET
        description: 'Get popular teams'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: string
          required: false
    - name: team-of-username
      path: /api/team/of/{username}
      operations:
      - name: teamofusername
        method: GET
        description: 'Teams of a player'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
    - name: team-search
      path: /api/team/search
      operations:
      - name: teamsearch
        method: GET
        description: 'Search teams'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: text
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: string
          required: false
    - name: team-teamid-users
      path: /api/team/{teamId}/users
      operations:
      - name: teamidusers
        method: GET
        description: 'Get members of a team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
