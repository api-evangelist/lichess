          in: path
          type: string
          required: true
        - name: max
          in: query
          type: string
          required: false
        - name: status
          in: query
          type: string
          required: false
        - name: createdBy
          in: query
          type: string
          required: false
        - name: name
          in: query
          type: string
          required: false
