naftiko: 1.0.0-alpha2
info:
  label: Lichess API — TV
  description: 'Lichess API — TV. 4 operations. Lead operation: Get current TV games. Self-contained Naftiko capability covering one Lichess business surface.'
  tags:
  - Lichess
  - TV
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LICHESS_API_TOKEN: LICHESS_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: tv
    baseUri: https://lichess.org
    description: Lichess TV business capability. Self-contained, no shared references.
    resources:
    - name: tv-channels
      path: /api/tv/channels
      operations:
      - name: tvchannels
        method: GET
        description: 'Get current TV games'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tv-feed
      path: /api/tv/feed
      operations:
      - name: tvfeed
        method: GET
        description: 'Stream current TV game'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tv-channel-feed
      path: /api/tv/{channel}/feed
      operations:
      - name: tvchannelfeed
        method: GET
        description: 'Stream current TV game of a TV channel'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channel
          in: path
          type: string
          required: true
    - name: tv-channel
      path: /api/tv/{channel}
      operations:
      - name: tvchannelgames
        method: GET
        description: 'Get best ongoing games of a TV channel'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channel
          in: path
          type: string
          required: true
        - name: nb
          in: query
          type: string
          required: false
        - name: moves
          in: query
          type: string
          required: false
        - name: pgnInJson
          in: query
          type: string
          required: false
        - name: tags
          in: query
          type: string
          required: false
        - name: clocks
          in: query
          type: string
          required: false
        - name: opening
          in: query
          type: string
          required: false
    authentication:
      type: bearer
      value: '{{env.LICHESS_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: tv-rest
    port: 8080
    description: REST adapter for Lichess TV. One Spectral-compliant resource per consumed operation.
    resources:
    - path: /v1/api/tv/channels
      name: tv-channels
      description: REST surface for tv-channels.
      operations:
      - method: GET
        name: tvchannels
        description: 'Get current TV games'
        call: tv.tvchannels
        with:
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tv/feed
      name: tv-feed
      description: REST surface for tv-feed.
      operations:
      - method: GET
        name: tvfeed
        description: 'Stream current TV game'
        call: tv.tvfeed
        with:
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tv/{channel}/feed
      name: tv-channel-feed
      description: REST surface for tv-channel-feed.
      operations:
      - method: GET
        name: tvchannelfeed
        description: 'Stream current TV game of a TV channel'
        call: tv.tvchannelfeed
        with:
          channel: rest.path.channel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tv/{channel}
      name: tv-channel
      description: REST surface for tv-channel.
      operations:
      - method: GET
        name: tvchannelgames
        description: 'Get best ongoing games of a TV channel'
        call: tv.tvchannelgames
        with:
          channel: rest.path.channel
          nb: rest.query.nb
          moves: rest.query.moves
          pgnInJson: rest.query.pgnInJson
          tags: rest.query.tags
          clocks: rest.query.clocks
          opening: rest.query.opening
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tv-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lichess TV. One tool per consumed operation.
    tools:
    - name: lichess-tvchannels
      description: 'Get current TV games'
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: tv.tvchannels
      with:
      outputParameters:
      - type: object
        mapping: $.
    - name: lichess-tvfeed
      description: 'Stream current TV game'
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: tv.tvfeed
      with:
      outputParameters:
      - type: object
        mapping: $.
    - name: lichess-tvchannelfeed
      description: 'Stream current TV game of a TV channel'
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: tv.tvchannelfeed
      with:
        channel: tools.channel
      outputParameters:
      - type: object
        mapping: $.
    - name: lichess-tvchannelgames
      description: 'Get best ongoing games of a TV channel'
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: tv.tvchannelgames
      with:
        channel: tools.channel
        nb: tools.nb
        moves: tools.moves
        pgnInJson: tools.pgnInJson
        tags: tools.tags
        clocks: tools.clocks
        opening: tools.opening
      outputParameters:
      - type: object
        mapping: $.
