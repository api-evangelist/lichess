      operations:
      - name: studychapterpgn
        method: GET
        description: 'Export one study chapter'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: studyId
          in: path
          type: string
          required: true
        - name: chapterId
          in: path
          type: string
          required: true
        - name: clocks
          in: query
          type: string
          required: false
        - name: comments
          in: query
          type: string
          required: false
        - name: variations
          in: query
          type: string
          required: false
        - name: orientation
          in: query
          type: string
          required: false
    - name: study-studyid-pgn
