naftiko: 1.0.0-alpha2
info:
  label: Lichess API — Studies
  description: 'Lichess API — Studies. 9 operations. Lead operation: Export one study chapter. Self-contained Naftiko capability covering one Lichess business surface.'
  tags:
  - Lichess
  - Studies
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
