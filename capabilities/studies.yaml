        method: POST
        description: 'Create a new Study'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: false
    - name: study-studyid-import-pgn
      path: /api/study/{studyId}/import-pgn
      operations:
      - name: apistudyimportpgn
        method: POST
        description: 'Import PGN into a study'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: studyId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: false
