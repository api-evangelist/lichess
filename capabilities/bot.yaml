naftiko: 1.0.0-alpha2
info:
  label: Lichess API — Bot
  description: 'Lichess API — Bot. 12 operations. Lead operation: Get online bots. Self-contained Naftiko capability covering one Lichess business surface.'
  tags:
  - Lichess
  - Bot
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LICHESS_API_TOKEN: LICHESS_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: bot
    baseUri: https://lichess.org
    description: Lichess Bot business capability. Self-contained, no shared references.
    resources:
    - name: bot-online
      path: /api/bot/online
      operations:
      - name: apibotonline
        method: GET
        description: 'Get online bots'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: nb
          in: query
          type: string
          required: false
    - name: bot-account-upgrade
      path: /api/bot/account/upgrade
      operations:
      - name: botaccountupgrade
        method: POST
        description: 'Upgrade to Bot account'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bot-game-stream-gameid
      path: /api/bot/game/stream/{gameId}
      operations:
      - name: botgamestream
        method: GET
        description: 'Stream Bot game state'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
    - name: bot-game-gameid-move-move
      path: /api/bot/game/{gameId}/move/{move}
      operations:
      - name: botgamemove
        method: POST
        description: 'Make a Bot move'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
        - name: move
          in: path
          type: string
          required: true
        - name: offeringDraw
          in: query
          type: string
          required: false
    - name: bot-game-gameid-chat
      path: /api/bot/game/{gameId}/chat
      operations:
      - name: botgamechat
        method: POST
        description: 'Write in the chat'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: false
      - name: botgamechatget
        method: GET
        description: 'Fetch the game chat'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
    - name: bot-game-gameid-abort
      path: /api/bot/game/{gameId}/abort
      operations:
      - name: botgameabort
        method: POST
        description: 'Abort a game'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
    - name: bot-game-gameid-resign
      path: /api/bot/game/{gameId}/resign
      operations:
      - name: botgameresign
        method: POST
        description: 'Resign a game'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
    - name: bot-game-gameid-draw-accept
      path: /api/bot/game/{gameId}/draw/{accept}
      operations:
      - name: botgamedraw
        method: POST
        description: 'Handle draw offers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
        - name: accept
          in: path
          type: string
          required: true
    - name: bot-game-gameid-takeback-accept
      path: /api/bot/game/{gameId}/takeback/{accept}
      operations:
      - name: botgametakeback
        method: POST
        description: 'Handle takeback offers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
        - name: accept
          in: path
          type: string
          required: true
    - name: bot-game-gameid-claim-victory
      path: /api/bot/game/{gameId}/claim-victory
      operations:
      - name: botgameclaimvictory
        method: POST
        description: 'Claim victory of a game'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
    - name: bot-game-gameid-claim-draw
      path: /api/bot/game/{gameId}/claim-draw
      operations:
      - name: botgameclaimdraw
        method: POST
        description: 'Claim draw of a game'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gameId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.LICHESS_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: bot-rest
    port: 8080
    description: REST adapter for Lichess Bot. One Spectral-compliant resource per consumed operation.
    resources:
    - path: /v1/api/bot/online
      name: bot-online
      description: REST surface for bot-online.
      operations:
      - method: GET
        name: apibotonline
        description: 'Get online bots'
        call: bot.apibotonline
        with:
          nb: rest.query.nb
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/account/upgrade
      name: bot-account-upgrade
      description: REST surface for bot-account-upgrade.
      operations:
      - method: POST
        name: botaccountupgrade
        description: 'Upgrade to Bot account'
        call: bot.botaccountupgrade
        with:
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/stream/{gameId}
      name: bot-game-stream-gameid
      description: REST surface for bot-game-stream-gameid.
      operations:
      - method: GET
        name: botgamestream
        description: 'Stream Bot game state'
        call: bot.botgamestream
        with:
          gameId: rest.path.gameId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/move/{move}
