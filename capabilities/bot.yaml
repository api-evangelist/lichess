      description: REST surface for bot-game-gameid-move-move.
      operations:
      - method: POST
        name: botgamemove
        description: 'Make a Bot move'
        call: bot.botgamemove
        with:
          gameId: rest.path.gameId
          move: rest.path.move
          offeringDraw: rest.query.offeringDraw
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/chat
      name: bot-game-gameid-chat
      description: REST surface for bot-game-gameid-chat.
      operations:
      - method: POST
        name: botgamechat
        description: 'Write in the chat'
        call: bot.botgamechat
        with:
          gameId: rest.path.gameId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: botgamechatget
        description: 'Fetch the game chat'
        call: bot.botgamechatget
        with:
          gameId: rest.path.gameId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/abort
      name: bot-game-gameid-abort
      description: REST surface for bot-game-gameid-abort.
      operations:
      - method: POST
        name: botgameabort
        description: 'Abort a game'
        call: bot.botgameabort
        with:
          gameId: rest.path.gameId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/resign
      name: bot-game-gameid-resign
      description: REST surface for bot-game-gameid-resign.
      operations:
      - method: POST
        name: botgameresign
        description: 'Resign a game'
        call: bot.botgameresign
        with:
          gameId: rest.path.gameId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/draw/{accept}
      name: bot-game-gameid-draw-accept
      description: REST surface for bot-game-gameid-draw-accept.
      operations:
      - method: POST
        name: botgamedraw
        description: 'Handle draw offers'
        call: bot.botgamedraw
        with:
          gameId: rest.path.gameId
          accept: rest.path.accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/takeback/{accept}
      name: bot-game-gameid-takeback-accept
      description: REST surface for bot-game-gameid-takeback-accept.
      operations:
      - method: POST
        name: botgametakeback
        description: 'Handle takeback offers'
        call: bot.botgametakeback
        with:
          gameId: rest.path.gameId
          accept: rest.path.accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/claim-victory
      name: bot-game-gameid-claim-victory
      description: REST surface for bot-game-gameid-claim-victory.
      operations:
      - method: POST
        name: botgameclaimvictory
        description: 'Claim victory of a game'
        call: bot.botgameclaimvictory
        with:
          gameId: rest.path.gameId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bot/game/{gameId}/claim-draw
      name: bot-game-gameid-claim-draw
      description: REST surface for bot-game-gameid-claim-draw.
      operations:
      - method: POST
        name: botgameclaimdraw
        description: 'Claim draw of a game'
        call: bot.botgameclaimdraw
        with:
          gameId: rest.path.gameId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bot-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lichess Bot. One tool per consumed operation.
    tools:
    - name: lichess-apibotonline
      description: 'Get online bots'
      hints:
        readOnly: true
