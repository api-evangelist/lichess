naftiko: 1.0.0-alpha2
info:
  label: Lichess API — Puzzles
  description: 'Lichess API — Puzzles. 11 operations. Lead operation: Get the daily puzzle. Self-contained Naftiko capability covering one Lichess business surface.'
  tags:
  - Lichess
  - Puzzles
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LICHESS_API_TOKEN: LICHESS_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: puzzles
    baseUri: https://lichess.org
    description: Lichess Puzzles business capability. Self-contained, no shared references.
    resources:
    - name: puzzle-daily
      path: /api/puzzle/daily
      operations:
      - name: apipuzzledaily
        method: GET
        description: 'Get the daily puzzle'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: puzzle-id
      path: /api/puzzle/{id}
      operations:
      - name: apipuzzleid
        method: GET
        description: 'Get a puzzle by its ID'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: puzzle-next
      path: /api/puzzle/next
      operations:
      - name: apipuzzlenext
        method: GET
        description: 'Get a new puzzle'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: angle
          in: query
          type: string
          required: false
        - name: difficulty
          in: query
          type: string
          required: false
        - name: color
          in: query
          type: string
          required: false
    - name: puzzle-batch-angle
      path: /api/puzzle/batch/{angle}
      operations:
      - name: apipuzzlebatchselect
        method: GET
        description: 'Get multiple puzzles at once'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: angle
          in: path
          type: string
          required: true
        - name: difficulty
          in: query
          type: string
          required: false
        - name: nb
          in: query
          type: string
          required: false
        - name: color
          in: query
          type: string
          required: false
      - name: apipuzzlebatchsolve
        method: POST
        description: 'Solve multiple puzzles at once'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: angle
          in: path
          type: string
          required: true
        - name: nb
          in: query
          type: string
          required: false
        - name: body
          in: body
          type: object
          required: false
    - name: puzzle-activity
      path: /api/puzzle/activity
      operations:
      - name: apipuzzleactivity
        method: GET
        description: 'Get your puzzle activity'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: max
          in: query
          type: string
          required: false
        - name: before
          in: query
          type: string
          required: false
        - name: since
          in: query
          type: string
          required: false
    - name: puzzle-replay-days-theme
      path: /api/puzzle/replay/{days}/{theme}
      operations:
      - name: apipuzzlereplay
        method: GET
        description: 'Get puzzles to replay'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: days
          in: path
          type: string
          required: true
        - name: theme
          in: path
          type: string
          required: true
    - name: puzzle-dashboard-days
      path: /api/puzzle/dashboard/{days}
      operations:
      - name: apipuzzledashboard
        method: GET
        description: 'Get your puzzle dashboard'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: days
          in: path
          type: string
          required: true
    - name: storm-dashboard-username
      path: /api/storm/dashboard/{username}
      operations:
      - name: apistormdashboard
        method: GET
        description: 'Get the storm dashboard of a player'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
        - name: days
          in: query
          type: string
          required: false
    - name: racer
      path: /api/racer
      operations:
      - name: racerpost
        method: POST
        description: 'Create and join a puzzle race'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: racer-id
      path: /api/racer/{id}
      operations:
      - name: racerget
        method: GET
        description: 'Get puzzle race results'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.LICHESS_API_TOKEN}}'
      placement: header
